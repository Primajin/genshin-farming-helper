name: "Build and Preview"

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

permissions: write-all

# Use a single shared concurrency group so all runs that write to gh-pages are
# serialised. "preview-${{ github.ref }}" only serialises per PR, which still
# allows concurrent writes from different PRs (or synchronize vs. closed events)
# and causes "remote contains work not present locally" / rebase conflicts.
# cancel-in-progress: false ensures queued runs still execute (important for
# the "closed" event that removes a preview).
concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    name: Make sure it builds. Then show a preview.
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-
      - name: Install dependencies
        run: npm ci
      - name: Generate resources
        run: npm run generate
      - name: Set env
        shell: bash
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          echo "BASE_URL=pr-preview/pr-${PR_NUMBER}/" >> "$GITHUB_ENV"
      - name: Run build with Base
        run: npx vite build --base="${{ env.BASE_URL }}"
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./build/
          custom-url: helper.farm
